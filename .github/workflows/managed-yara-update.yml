name: Update YARA rules

on:
  # Temporarily manual-only while provisioning config is archived at the repo root.
  workflow_dispatch: # Allow manual triggering of the workflow

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.2'

      - name: List directory contents
        working-directory: ./single-node/provisioning/wazuh_endpoint/windows/yara
        run: ls -la

      - name: install python packages
        working-directory: ./single-node/provisioning/wazuh_endpoint/windows/yara
        run: |
          sudo apt-get update
          sudo apt-get install -y yara
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: execute py script
        run: python .github/scripts/download_yara_rules.py
        env:
          VALHALLA_API_KEY: ${{ secrets.VALHALLA_API_KEY }}

      - name: Validate generated YARA rules
        run: |
          yara -w single-node/provisioning/wazuh_endpoint/windows/yara/yara_rules_append.yar /dev/null
          yara -w single-node/provisioning/wazuh_endpoint/windows/yara/yara_rules.yar /dev/null

      - name: Commit and push managed YARA rules
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./single-node/provisioning/wazuh_endpoint/windows/yara/yara_rules.yar
          git diff --cached --quiet && echo "No managed YARA changes to commit" || (
            git commit -m "Daily managed YARA rules update"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
